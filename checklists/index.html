<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Checklist Vault • Chasing Majors</title>

  <!-- No manifest here for now (single-PWA later) -->
  <!-- <link rel="manifest" href="./manifest.webmanifest" /> -->

  <!-- Bangers font (matches PRV vibe) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#0b0f14;
      --panel:#111826;
      --panel2:#0f1623;
      --text:#e8eef7;
      --muted:#9bb0c8;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.14);
      --shadow: rgba(0,0,0,.35);

      --btnPrimaryBg:#ffffff;
      --btnPrimaryText:#0b0f14;
      --btnGhostBg:transparent;
      --btnGhostBorder:rgba(255,255,255,.14);

      --pillBg: rgba(255,255,255,.02);
      --pillBorder: rgba(255,255,255,.10);

      --inputBg: rgba(255,255,255,.02);
      --inputBorder: rgba(255,255,255,.10);

      --icon:#cbd5e1;
      --accent:#ffffff;

      --navH: 74px;
      --radius: 18px;
    }

    html[data-theme="light"]{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --panel2:#ffffff;
      --text:#0b0f14;
      --muted:#52657a;
      --border:rgba(10,20,40,.12);
      --border2:rgba(10,20,40,.14);
      --shadow: rgba(10,20,40,.12);

      --btnPrimaryBg:#111827;
      --btnPrimaryText:#ffffff;
      --btnGhostBg:transparent;
      --btnGhostBorder:rgba(10,20,40,.14);

      --pillBg:#ffffff;
      --pillBorder:rgba(10,20,40,.12);

      --inputBg:#ffffff;
      --inputBorder:rgba(10,20,40,.12);

      --icon:#111827;
      --accent:#111827;
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: calc(var(--navH) + env(safe-area-inset-bottom) + 12px);
    }

    /* Top header like PRV */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 14px 10px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,0));
      backdrop-filter: blur(8px);
    }
    html[data-theme="light"] .topbar{
      background: linear-gradient(to bottom, rgba(255,255,255,.75), rgba(255,255,255,0));
    }

    .brandRow{
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
      max-width: 720px;
      margin: 0 auto;
    }

    .brand{
      font-family: "Bangers", system-ui, sans-serif;
      font-size: 44px;
      letter-spacing: 1px;
      line-height: 1;
      text-align: center;
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      user-select: none;
      white-space: nowrap;
    }
    .brand .cap{ font-size: 1.25em; }

    .topRight{
      position:absolute;
      right: 0;
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--pillBorder);
      background: var(--pillBg);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 800;
    }

    /* Quick mobile fix: avoid pill overlapping brand */
    @media (max-width: 560px){
      .topRight .pill{ display:none; }
      .brand{ font-size: 40px; }
    }

    .iconBtn{
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,.04);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor: pointer;
      box-shadow: 0 6px 18px var(--shadow);
    }
    html[data-theme="light"] .iconBtn{ background: rgba(0,0,0,.02); }
    .iconBtn:hover{ border-color: rgba(245,197,66,.35); }

    .icon{
      width: 18px; height: 18px;
      fill: none;
      stroke: var(--icon);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Match Home proportions */
    .wrap{
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .card{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 10px 24px var(--shadow);
    }

    .sub{
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 10px 0;
      font-weight: 700;
      line-height: 1.35;
    }

    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:space-between; }

    input, select, button{
      font-family: inherit;
      border-radius: 12px;
      padding: 12px 12px;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    select{
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0;
      height: auto;
    }

    /* Search input with magnifying glass */
    .searchWrap{
      position: relative;
      width: 100%;
    }

    .searchWrap input{
      width: 100%;
      background: var(--inputBg);
      border: 1px solid var(--inputBorder);
      color: var(--text);
      padding-left: 42px;
      height: 46px;
    }

    .searchIcon{
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--muted);
      stroke-width: 2;
      fill: none;
      pointer-events: none;
    }

    /* Buttons like PRV */
    .btn{
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      cursor: pointer;
      font-weight: 900;
    }
    .btnPrimary{
      background: var(--btnPrimaryBg);
      color: var(--btnPrimaryText);
      border-color: transparent;
    }
    .btnGhost{
      background: var(--btnGhostBg);
      color: var(--text);
      border-color: var(--btnGhostBorder);
    }
    .btn:active{ transform: translateY(1px); }

    .divider{
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }

    /* Tabs */
    .tabs{
      display:flex;
      gap:8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      margin-top: 6px;
    }
    .tab{
      white-space: nowrap;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      background: var(--panel2);
      cursor:pointer;
      font-size: 13px;
      flex: 0 0 auto;
      color: var(--text);
      font-weight: 800;
    }
    .tab.active{ border-color: rgba(245,197,66,.45); }

    /* Results */
    .resultsBox{
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow:hidden;
      background: var(--panel2);
    }
    .resultsBox .r{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .resultsBox .r:last-child{ border-bottom:none; }

    .rTop{ font-size: 14px; }
    .rSub{ font-size: 12px; color: var(--muted); margin-top: 3px; }

    .badge{
      display:inline-flex;
      padding:2px 7px;
      border-radius: 999px;
      border:1px solid var(--border2);
      background: rgba(255,255,255,.02);
      font-size: 11px;
      margin-left: 8px;
      color: var(--text);
      font-weight: 800;
    }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
      align-items:center;
      justify-content: space-between;
    }

    /* Set view typography */
    .setHeaderTitle{ font-size: 18px; font-weight: 950; margin:0; }
    .setHeaderSub{ color: var(--muted); font-size: 13px; margin-top: 4px; }

    .sectionBlock{ margin-top: 14px; }
    .subsetTitle{ font-weight: 950; margin-top: 12px; }
    .subsetMeta{ color: var(--muted); font-size: 12px; margin-top: 2px; }

    .parTitle{ margin-top: 8px; font-weight: 900; font-size: 14px; }
    ul.par{ margin: 6px 0 0 0; padding-left: 16px; font-size: 14px; }
    ul.par li{ margin: 4px 0; font-size: 14px; color: var(--text); }

    /* Typeahead dropdown */
    .typeaheadList{
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 8px);
      z-index: 50;
      border: 1px solid var(--border2);
      background: var(--panel2);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      display: none;
      max-height: 280px;
      overflow-y: auto;
    }
    .typeaheadItem{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .typeaheadItem:last-child{ border-bottom: none; }
    .typeaheadItem:hover{ background: rgba(245,197,66,.10); }
    .typeaheadTitle{ font-size: 14px; font-weight: 900; }
    .typeaheadSub{ font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Uniform bottom nav (same style as Home) */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      z-index: 50;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.30)), var(--bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
    }
    html[data-theme="light"] .bottomNav{
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(10,20,40,.06)), var(--bg);
    }
    .navRow{
      display:flex;
      justify-content:space-between;
      gap:10px;
      max-width: 720px;
      margin:0 auto;
    }
    .navBtn{
      flex:1;
      height: 46px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 900;
      font-size: 14px;
      cursor:pointer;
      box-shadow: 0 10px 24px var(--shadow);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .navBtn.active{
      outline: 2px solid rgba(245,197,66,.25);
      border-color: rgba(245,197,66,.35);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="topbar">
    <div class="brandRow">
      <div class="brand"><span class="cap">C</span>hecklist <span class="cap">V</span>ault</div>

      <div class="topRight">
        <div class="pill" id="apiPill">API: checking…</div>

        <button class="iconBtn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon" viewBox="0 0 24 24" id="themeIcon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="wrap">

    <!-- Search card -->
    <div class="card">
      <div class="sub">Search a set (e.g., “2026 Topps Series 1”) or a player (e.g., “Aaron Judge”).</div>

      <div class="row">
        <div class="pill" id="sportPillWrap">
          <span style="margin-right:8px;">Sport</span>
          <select id="sport">
            <option value="baseball">Baseball</option>
            <option value="basketball">Basketball</option>
            <option value="football">Football</option>
            <option value="soccer">Soccer</option>
            <option value="hockey">Hockey</option>
          </select>
        </div>

        <div class="pill" id="countPill" style="display:none;">0 results</div>
      </div>

      <div style="height:10px;"></div>

      <!-- Search input with icon + typeahead -->
      <div class="searchWrap" id="searchWrap">
        <svg class="searchIcon" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>

        <input id="search" placeholder="Let's search something" autocomplete="off" />
        <div id="typeahead" class="typeaheadList"></div>
      </div>

      <div style="height:10px;"></div>

      <button id="go" class="btn btnPrimary">Search</button>

      <div style="height:10px;"></div>

      <button id="browse" class="btn btnGhost">Browse</button>

      <!-- Search results -->
      <div class="btnRow">
        <button id="moreSearch" class="btn btnGhost" style="display:none; width:auto; padding: 10px 14px; height:auto;">Show more</button>
      </div>

      <div id="searchResults" class="resultsBox" style="display:none;"></div>
    </div>

    <div style="height:12px;"></div>

    <!-- Set viewer card -->
    <div class="card" id="setView" style="display:none;">
      <div class="row">
        <div>
          <div class="setHeaderTitle" id="setTitle">Base Checklist</div>
          <div class="setHeaderSub" id="setMeta">Loading…</div>
        </div>
        <div class="pill" id="setCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="setTabs"></div>

      <div id="setBody"></div>
    </div>

  </div>

  <!-- Browse Modal -->
  <div id="browseModal" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.55);">
    <div style="max-width:820px; margin:8vh auto; padding:14px;">
      <div class="card">
        <div class="row">
          <div>
            <div style="font-size:18px; font-weight:950;">Loaded Checklists</div>
            <div class="sub" style="margin-top:6px;">Browse what’s currently in the tool.</div>
          </div>
          <button id="browseClose" class="btn btnGhost" style="width:auto; height:auto; padding:10px 14px;">Close</button>
        </div>

        <div class="divider"></div>

        <div class="searchWrap">
          <svg class="searchIcon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input id="browseFilter" placeholder="Filter loaded checklists…" />
        </div>

        <div id="browseList" class="resultsBox" style="margin-top:12px;"></div>

        <div class="btnRow">
          <button id="browseMore" class="btn btnGhost" style="display:none; width:auto; height:auto; padding:10px 14px;">Load more</button>
          <div class="pill" id="browsePill" style="display:none;">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Uniform Bottom Nav -->
  <nav class="bottomNav" aria-label="Primary">
    <div class="navRow">
      <button class="navBtn" type="button" onclick="location.href='/'">Home</button>
      <button class="navBtn active" type="button" onclick="location.href='/checklists/'">Checklist Vault</button>
      <button class="navBtn" type="button" onclick="location.href='/vault/'">Print Run Vault</button>
    </div>
  </nav>

  <!-- Checklist app logic -->
  <script src="/checklists/app.js?v=4"></script>
</body>
</html>
