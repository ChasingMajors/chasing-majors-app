<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>Checklist Vault • Chasing Majors</title>

  <!-- No manifest here for now -->
  <!-- <link rel="manifest" href="./manifest.webmanifest" /> -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    :root{
      --navH: 62px;
      --contentMax: 900px;

      /* DARK (PRV) */
      --bg:#0b0b0b;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.78);

      --cardBg:rgba(255,255,255,0.08);
      --cardBorder:rgba(255,255,255,0.12);

      --inputBg:#111;
      --inputBorder:rgba(255,255,255,0.16);

      --btnPrimaryBg:#ffffff;
      --btnPrimaryText:#000000;

      --btnGhostBg:transparent;
      --btnGhostText:#ffffff;
      --btnGhostBorder:rgba(255,255,255,0.22);

      --navBg:#0b0b0b;
      --navBorder:rgba(255,255,255,0.12);

      --navBtnBg:rgba(255,255,255,0.12);
      --navBtnIcon:#ffffff;

      --kvBorder:rgba(255,255,255,0.10);

      /* dropdown */
      --ddBg:#111;
      --ddBorder:rgba(255,255,255,0.18);
      --ddHover:rgba(255,255,255,0.10);
      --ddActive:rgba(255,255,255,0.16);
    }

    /* Match PRV light style, but keep your data-theme system */
    html[data-theme="light"]{
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:rgba(0,0,0,0.70);

      --cardBg:rgba(0,0,0,0.05);
      --cardBorder:rgba(0,0,0,0.10);

      --inputBg:#ffffff;
      --inputBorder:rgba(0,0,0,0.18);

      --btnPrimaryBg:#111111;
      --btnPrimaryText:#ffffff;

      --btnGhostBg:#E0E0E0;
      --btnGhostText:#000000;
      --btnGhostBorder:#E0E0E0;

      --navBg:#ffffff;
      --navBorder:rgba(0,0,0,0.10);

      --navBtnBg:rgba(0,0,0,0.08);
      --navBtnIcon:#0b0b0b;

      --kvBorder:rgba(0,0,0,0.10);

      --ddBg:#ffffff;
      --ddBorder:rgba(0,0,0,0.16);
      --ddHover:rgba(0,0,0,0.06);
      --ddActive:rgba(0,0,0,0.10);
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      transition: background 160ms ease, color 160ms ease;
    }

    /* PRV content wrapper */
    .content{
      padding: 16px 16px calc(var(--navH) + 24px);
      max-width: var(--contentMax);
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* Header like PRV */
    .headerRow{
      position: relative;
      max-width: var(--contentMax);
      margin: 6px auto 12px;
      text-align: center;
    }

    .appTitle{
      font-family: "Bangers", cursive;
      font-size: 34px;
      letter-spacing: 1px;
      line-height: 1;
      margin: 0;
    }
    .appTitle .big{ font-size: 42px; }

    /* Right controls */
    .topRight{
      position:absolute;
      right:0;
      top:0;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--cardBorder);
      background: var(--cardBg);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-weight:700;
    }

    .iconBtn{
      width:44px;
      height:44px;
      border-radius: 14px;
      border:1px solid var(--cardBorder);
      background: var(--cardBg);
      color: var(--text);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
      z-index: 5;
    }

    .icon{
      width:22px;
      height:22px;
      display:block;
      fill:none;
      stroke: currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* PRV card */
    .card{
      background: var(--cardBg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 16px;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .heroText{
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    /* Sport pill row */
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:space-between; }

    select{
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0;
      height: auto;
      font-size: 14px;
      font-weight:700;
      outline:none;
    }

    /* Search */
    .searchWrap{ position: relative; width:100%; }

    .searchIcon{
      position:absolute;
      left:12px;
      top:50%;
      transform: translateY(-50%);
      width:18px;
      height:18px;
      opacity: 0.75;
      pointer-events:none;
      color: var(--text);
      z-index: 3;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding: 12px 12px 12px 40px;
      border-radius: 12px;
      border: 1px solid var(--inputBorder);
      background: var(--inputBg);
      color: var(--text);
      font-size: 16px;
      outline:none;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    button.btn{
      width:100%;
      margin-top:10px;
      padding: 12px;
      border-radius: 12px;
      font-weight:700;
      cursor:pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    button.btnPrimary{
      border:0;
      background: var(--btnPrimaryBg);
      color: var(--btnPrimaryText);
    }

    button.btnGhost{
      background: var(--btnGhostBg);
      color: var(--btnGhostText);
      border: 1px solid var(--btnGhostBorder);
    }

    /* Results box */
    .resultsBox{
      margin-top: 12px;
      border: 1px solid var(--kvBorder);
      border-radius: 14px;
      overflow:hidden;
      background: transparent;
    }
    .resultsBox .r{
      padding: 10px 12px;
      border-bottom: 1px solid var(--kvBorder);
    }
    .resultsBox .r:last-child{ border-bottom:none; }

    .rTop{ font-size: 14px; }
    .rSub{ font-size: 12px; color: var(--muted); margin-top: 3px; }

    .badge{
      display:inline-flex;
      padding:2px 7px;
      border-radius: 999px;
      border:1px solid var(--cardBorder);
      background: transparent;
      font-size: 11px;
      margin-left: 8px;
      color: var(--text);
      font-weight:700;
    }

    /* Tabs */
    .divider{
      height: 1px;
      background: var(--kvBorder);
      margin: 12px 0;
    }
    .tabs{
      display:flex;
      gap:8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      margin-top: 6px;
    }
    .tab{
      white-space: nowrap;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--cardBorder);
      background: transparent;
      cursor:pointer;
      font-size: 13px;
      flex: 0 0 auto;
      color: var(--text);
      font-weight:700;
    }
    .tab.active{ border-color: rgba(255,255,255,0.30); }

    /* Set view typography */
    .setHeaderTitle{ font-size: 18px; font-weight: 800; margin:0; }
    .setHeaderSub{ color: var(--muted); font-size: 13px; margin-top: 4px; }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top: 10px;
      align-items:center;
      justify-content: space-between;
    }

    /* Typeahead dropdown uses PRV variables */
    .typeaheadList{
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 8px);
      z-index: 50;
      border: 1px solid var(--ddBorder);
      background: var(--ddBg);
      border-radius: 12px;
      overflow: auto;
      max-height: 280px;
      display: none;
      box-shadow: 0 16px 40px rgba(0,0,0,0.55);
    }
    .typeaheadItem{
      padding: 12px 12px;
      border-bottom: 1px solid var(--kvBorder);
      cursor: pointer;
      background: transparent;
    }
    .typeaheadItem:last-child{ border-bottom: none; }
    .typeaheadItem:hover{ background: var(--ddHover); }
    .typeaheadItem:active{ background: var(--ddActive); }
    .typeaheadTitle{ font-size: 14px; font-weight: 800; color: var(--text); }
    .typeaheadSub{ font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Bottom nav EXACT PRV style (3 buttons) */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      height: var(--navH);
      background: var(--navBg);
      border-top: 1px solid var(--navBorder);
      z-index: 9999;
      display:flex;
      justify-content:center;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .bottomNavInner{
      width:100%;
      max-width: var(--contentMax);
      padding: 10px 16px max(10px, env(safe-area-inset-bottom));
      box-sizing:border-box;
    }
    .navRow{
      display:flex;
      gap:10px;
    }
    .navBtn{
      flex:1;
      height: 42px;
      border:0;
      border-radius: 14px;
      background: var(--navBtnBg);
      color: var(--navBtnIcon);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      transition: background 160ms ease, color 160ms ease;
    }
    .navBtn.active{
      outline: 2px solid rgba(255,255,255,0.18);
    }

    /* Mobile: hide API pill so it doesn't collide */
    @media (max-width: 560px){
      .topRight .pill{ display:none; }
    }
  </style>
</head>

<body>
  <div class="content">
    <div class="headerRow">
      <h1 class="appTitle"><span class="big">C</span>hecklist <span class="big">V</span>ault</h1>

      <div class="topRight">
        <div class="pill" id="apiPill">API: checking…</div>

        <button class="iconBtn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon" viewBox="0 0 24 24" id="themeIcon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search card -->
    <div class="card">
      <div class="heroText">Search a set (e.g., “2026 Topps Series 1”) or a player (e.g., “Aaron Judge”).</div>

      <div class="row">
        <div class="pill" id="sportPillWrap">
          <span style="margin-right:8px;">Sport</span>
          <select id="sport">
            <option value="baseball">Baseball</option>
            <option value="basketball">Basketball</option>
            <option value="football">Football</option>
            <option value="soccer">Soccer</option>
            <option value="hockey">Hockey</option>
          </select>
        </div>

        <div class="pill" id="countPill" style="display:none;">0 results</div>
      </div>

      <div style="height:10px;"></div>

      <div class="searchWrap" id="searchWrap">
        <svg class="searchIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
          <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2"></path>
        </svg>

        <input id="search" placeholder="Let's search something" autocomplete="off" />
        <div id="typeahead" class="typeaheadList"></div>
      </div>

      <button id="go" class="btn btnPrimary">Search</button>
      <button id="browse" class="btn btnGhost">Browse</button>

      <div class="btnRow">
        <button id="moreSearch" class="btn btnGhost" style="display:none; width:auto;">Show more</button>
      </div>

      <div id="searchResults" class="resultsBox" style="display:none;"></div>
    </div>

    <div style="height:12px;"></div>

    <!-- Set viewer card -->
    <div class="card" id="setView" style="display:none;">
      <div class="row">
        <div>
          <div class="setHeaderTitle" id="setTitle">Base Checklist</div>
          <div class="setHeaderSub" id="setMeta">Loading…</div>
        </div>
        <div class="pill" id="setCode">code</div>
      </div>

      <div class="divider"></div>

      <div class="tabs" id="setTabs"></div>
      <div id="setBody"></div>
    </div>
  </div>

  <!-- Browse Modal (kept functional; styling stays OK) -->
<div id="browseModal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.72); backdrop-filter: blur(6px);">
<div style="height:100%; display:flex; justify-content:center; align-items:flex-start; padding:14px; box-sizing:border-box;">
  <div class="card" style="width:min(820px, 100%); max-height: calc(100dvh - 28px); overflow:hidden; display:flex; flex-direction:column;">

        <div class="row">
          <div>
            <div style="font-size:18px; font-weight:800;">Loaded Checklists</div>
            <div style="opacity:.8; font-size:13px; margin-top:6px;">Browse what’s currently in the tool.</div>
          </div>
          <button id="browseClose" class="btn btnGhost" style="width:auto;">Close</button>
        </div>

        <div class="divider"></div>

        <div class="searchWrap">
          <svg class="searchIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2"></path>
          </svg>
          <input id="browseFilter" placeholder="Filter loaded checklists…" />
        </div>

<div id="browseList" class="resultsBox" style="margin-top:12px; overflow:auto; -webkit-overflow-scrolling:touch; flex:1; min-height:0;"></div>
    
        <div class="btnRow">
          <button id="browseMore" class="btn btnGhost" style="display:none; width:auto;">Load more</button>
          <div class="pill" id="browsePill" style="display:none;">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottomNav" aria-label="Primary">
    <div class="bottomNavInner">
      <div class="navRow">
        <button class="navBtn" type="button" onclick="location.href='/'">Home</button>
        <button class="navBtn active" type="button" onclick="location.href='/checklists/'">Checklist Vault</button>
        <button class="navBtn" type="button" onclick="location.href='/vault/'">Print Run Vault</button>
      </div>
    </div>
  </div>

  <script src="/checklists/app.js?v=6"></script>
</body>
</html>
