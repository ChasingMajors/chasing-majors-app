<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Chasing Majors</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
}
.content{
  padding:20px;
  max-width:900px;
  margin:auto;
}
.appTitle{
  font-family:"Bangers";
  font-size:40px;
  text-align:center;
}
.searchWrap{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.searchInput{
  flex:1;
  height:45px;
  border-radius:10px;
  border:none;
  padding:10px;
}
.primaryBtn{
  height:45px;
  padding:0 20px;
  background:#1e90ff;
  border:none;
  color:#fff;
  border-radius:10px;
}
.homeDropdown{
  background:#111;
  border:1px solid #333;
  margin-top:5px;
  border-radius:10px;
}
.homeDdItem{
  padding:10px;
  cursor:pointer;
}
.homeDdItem:hover{
  background:#222;
}
.overlay{
  position:fixed;
  inset:0;
  background:#0b0b0b;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="overlay" class="overlay">
  <div>Loading Chasing Majors...</div>
</div>

<div class="content">
  <div class="appTitle">Chasing Majors</div>

  <div class="searchWrap">
    <input id="homeSearch" class="searchInput" placeholder="Search player or set..." />
    <button id="searchBtn" class="primaryBtn">Search</button>
  </div>

  <div id="homeDropdown" class="homeDropdown"></div>
</div>

<script>
(function(){

const LOG_API = "https://script.google.com/macros/s/AKfycbwzmm9rEr4pIN1-JNwn5Sp0Wma2u8-Q4GrxgAtiLQzrKjCHrPAwLi8D1SxPqg5f3X7u/exec";
const CHECKLIST_API = "https://script.google.com/macros/s/AKfycbxVsOvACvcgwf8igVdlRcGVqTa0KciCO_w23GCHzVXp4dQrUE-4hx1Uut5o_KrCLXYL/exec";

let players = [];
let index = [];
let suggestions = [];

// =================
// FIX LOADING SCREEN
// =================
function hideOverlay(){
  const el = document.getElementById("overlay");
  if(!el) return;
  el.style.display = "none";
}

// =================
// LOAD PLAYERS
// =================
async function loadPlayers(){
  try{
    const r = await fetch(LOG_API + "?action=getTrendingPlayers");
    const d = await r.json();
    if(d.ok) players = d.players;
  }catch(e){}
}

// =================
// LOAD PRODUCT INDEX
// =================
async function loadIndex(){
  try{
    const r = await fetch(CHECKLIST_API,{
      method:"POST",
      body:JSON.stringify({action:"index"})
    });
    const d = await r.json();
    if(d.ok) index = d.index;
  }catch(e){}
}

// =================
// SEARCH SUGGESTIONS
// =================
function getSuggestions(q){
  q = q.toLowerCase();
  if(q.length < 2) return [];

  const out = [];

  // players
  players.forEach(p=>{
    if(p.name.toLowerCase().includes(q)){
      out.push({
        type:"player",
        label:p.name,
        sport:p.sport,
        display:p.name + " - " + p.sport
      });
    }
  });

  // products
  index.forEach(i=>{
    if(i.DisplayName.toLowerCase().includes(q)){
      out.push({
        type:"product",
        ...i
      });
    }
  });

  return out.slice(0,8);
}

// =================
// RENDER DROPDOWN
// =================
function render(list){
  const dd = document.getElementById("homeDropdown");

  if(!list.length){
    dd.innerHTML="";
    return;
  }

  dd.innerHTML = list.map((x,i)=>`
    <div class="homeDdItem" data-i="${i}">
      ${x.display || x.DisplayName}
    </div>
  `).join("");

  suggestions = list;

  [...dd.children].forEach(el=>{
    el.onclick = ()=>{
      const item = suggestions[el.dataset.i];
      go(item);
    };
  });
}

// =================
// ROUTE
// =================
function go(item){

  if(item.type === "player"){
    location.href = "/checklists/?q=" +
      encodeURIComponent(item.label) +
      "&sport=" + item.sport;
    return;
  }

  location.href = "/checklists/?code=" + item.Code +
    "&sport=" + item.sport +
    "&q=" + encodeURIComponent(item.DisplayName);
}

// =================
// INIT
// =================
document.addEventListener("DOMContentLoaded",()=>{

  loadPlayers();
  loadIndex();

  const input = document.getElementById("homeSearch");
  const btn = document.getElementById("searchBtn");

  input.addEventListener("input",e=>{
    render(getSuggestions(e.target.value));
  });

  input.addEventListener("keydown",e=>{
    if(e.key==="Enter") go({label:input.value,type:"player"});
  });

  btn.onclick = ()=>{
    location.href = "/checklists/?q=" + encodeURIComponent(input.value);
  };

  setTimeout(hideOverlay,500);
});

})();
</script>

</body>
</html>
