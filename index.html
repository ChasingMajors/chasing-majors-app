<script>
(function () {

const LOG_EXEC_URL = "https://script.google.com/macros/s/AKfycbwzmm9rEr4pIN1-JNwn5Sp0Wma2u8-Q4GrxgAtiLQzrKjCHrPAwLi8D1SxPqg5f3X7u/exec";
const CHECKLIST_EXEC_URL = "https://script.google.com/macros/s/AKfycbxVsOvACvcgwf8igVdlRcGVqTa0KciCO_w23GCHzVXp4dQrUE-4hx1Uut5o_KrCLXYL/exec";
const HOME_INDEX_KEY = "cm_home_index_v2";

let homeIndex = [];
let activeSuggestions = [];
let trendingPlayers = [];

// ==========================
// 🔥 FIX: HIDE LOADING SCREEN
// ==========================
function hideOverlay() {
  const el = document.getElementById("overlay");
  if (!el) return;

  el.classList.add("hide");

  setTimeout(() => {
    el.style.display = "none";
  }, 300);
}

// ==========================
// HELPERS
// ==========================
function cleanQuery(v){
  return String(v||"").replace(/\u2019/g,"'").replace(/\s+/g," ").trim();
}

function normalizeQuery(v){
  return cleanQuery(v).toLowerCase().replace(/[^\w\s']/g," ").replace(/\s+/g," ").trim();
}

function capitalize(str){
  return str ? str.charAt(0).toUpperCase() + str.slice(1) : "";
}

// ==========================
// 🔥 LOAD TRENDING PLAYERS
// ==========================
async function loadTrendingPlayers() {
  try {
    const res = await fetch(LOG_EXEC_URL + "?action=getTrendingPlayers");
    const data = await res.json();

    if (data && data.ok && Array.isArray(data.players)) {
      trendingPlayers = data.players;
    }
  } catch (e) {
    trendingPlayers = [];
  }
}

// ==========================
// 🔥 SUGGESTIONS ENGINE
// ==========================
function getHomeSuggestions(query) {
  const q = normalizeQuery(query);
  if (!q || q.length < 2) return [];

  const results = [];

  // PLAYERS FIRST
  trendingPlayers.forEach(p => {
    const name = (p.name || "").toLowerCase();
    if (!name.includes(q)) return;

    results.push({
      type: "player",
      label: p.name,
      sport: p.sport,
      DisplayName: p.name + " — " + capitalize(p.sport)
    });
  });

  // PRODUCTS SECOND
  const seen = {};
  homeIndex.forEach(item => {
    const displayName = String(item.DisplayName || "").toLowerCase();
    const keywords = String(item.Keywords || "").toLowerCase();
    const code = String(item.Code || "").toLowerCase();
    const hay = displayName + " | " + keywords + " | " + code;

    if (!hay.includes(q)) return;

    const key = item.Code + "|" + item.DisplayName;
    if (seen[key]) return;
    seen[key] = true;

    results.push(item);
  });

  return results.slice(0, 8);
}

// ==========================
// ROUTING
// ==========================
function runSearch(source, selectedItem) {

  // PLAYER
  if (selectedItem && selectedItem.type === "player") {
    location.href =
      "/checklists/?q=" +
      encodeURIComponent(selectedItem.label) +
      "&sport=" +
      encodeURIComponent(selectedItem.sport);
    return;
  }

  // PRODUCT
  if (selectedItem && selectedItem.Code) {
    location.href =
      "/checklists/?code=" + encodeURIComponent(selectedItem.Code) +
      "&sport=" + encodeURIComponent(selectedItem.sport || "") +
      "&type=product&q=" + encodeURIComponent(selectedItem.DisplayName);
    return;
  }

  const input = document.getElementById("homeSearch");
  const query = cleanQuery(input ? input.value : "");

  if (!query) {
    location.href = "/checklists/";
    return;
  }

  location.href = "/checklists/?q=" + encodeURIComponent(query);
}

// ==========================
// DROPDOWN
// ==========================
function renderHomeDropdown(items) {
  const dd = document.getElementById("homeDropdown");
  if (!dd) return;

  activeSuggestions = items || [];

  if (!items.length) {
    dd.style.display = "none";
    return;
  }

  dd.innerHTML = items.map((item, idx) => `
    <div class="homeDdItem" data-idx="${idx}">
      <div class="homeDdTitle">${item.DisplayName || ""}</div>
      <div class="homeDdMeta">${item.sport || ""}</div>
    </div>
  `).join("");

  dd.style.display = "block";

  Array.from(dd.children).forEach(node => {
    node.addEventListener("click", () => {
      const idx = Number(node.dataset.idx);
      const item = activeSuggestions[idx];
      runSearch("suggestion_click", item);
    });
  });
}

// ==========================
// LOAD INDEX
// ==========================
async function loadHomeIndex() {
  try {
    const cached = localStorage.getItem(HOME_INDEX_KEY);
    if (cached) homeIndex = JSON.parse(cached);
  } catch(e){}

  try {
    const res = await fetch(CHECKLIST_EXEC_URL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ action:"index", payload:{} })
    });

    const data = await res.json();

    if (data && data.ok && Array.isArray(data.index)) {
      homeIndex = data.index;
      localStorage.setItem(HOME_INDEX_KEY, JSON.stringify(homeIndex));
    }
  } catch(e){}
}

// ==========================
// 🔥 RESTORE HOMEPAGE DATA
// ==========================
function hydrateHomeFeed() {
  fetch(LOG_EXEC_URL + "?action=getHomeFeed")
    .then(r => r.json())
    .then(data => {
      if (!data || !data.ok) return;

      console.log("Home feed loaded", data);
      // (kept minimal so nothing breaks)
    })
    .catch(()=>{});
}

// ==========================
// INIT
// ==========================
document.addEventListener("DOMContentLoaded", function () {

  // 🔥 CRITICAL FIXES
  setTimeout(hideOverlay, 300);
  hydrateHomeFeed();

  loadHomeIndex();
  loadTrendingPlayers();

  const input = document.getElementById("homeSearch");
  const btn = document.getElementById("searchPrimaryBtn");

  if (input) {
    input.addEventListener("input", e => {
      renderHomeDropdown(getHomeSuggestions(e.target.value));
    });

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        runSearch("enter");
      }
    });
  }

  if (btn) {
    btn.addEventListener("click", () => runSearch("button"));
  }
});

// SAFETY FALLBACKS
window.addEventListener("load", () => setTimeout(hideOverlay, 500));
setTimeout(hideOverlay, 2000);

})();
</script>
