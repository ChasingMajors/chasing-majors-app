<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Chasing Majors App</title>

  <!-- Match PRV vibe: Bangers -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#111826;
      --panel2:#0f1623;
      --text:#e8eef7;
      --muted:#9bb0c8;
      --border:rgba(255,255,255,.10);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
      --navH: 74px;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---------- SPLASH OVERLAY (legacy feel) ---------- */
    .overlay{
      position: fixed;
      inset: 0;
      z-index: 9999;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 600px at 50% 20%, rgba(255,255,255,.06), rgba(0,0,0,0)),
                  var(--bg);
      transition: opacity .25s ease;
    }
    .overlay.hidden{
      opacity:0;
      pointer-events:none;
    }
    .splashInner{
      width: min(520px, 92vw);
      padding: 22px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      box-shadow: var(--shadow);
      text-align:center;
    }
    .splashTitle{
      margin: 0 0 6px 0;
      font-family: "Bangers", system-ui, sans-serif;
      letter-spacing: 1px;
      font-size: 40px;
      line-height: 1;
    }
    .splashSub{
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .spinner{
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,.16);
      border-top-color: rgba(255,255,255,.70);
      margin: 0 auto;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* ---------- PAGE LAYOUT ---------- */
    .wrap{
      min-height: 100dvh;
      padding: 14px 14px calc(var(--navH) + env(safe-area-inset-bottom) + 12px);
      display:flex;
      justify-content:center;
    }
    .stack{
      width: min(720px, 100%);
    }

    /* Top brand like PRV */
    .topBrand{
      padding: 10px 6px 12px;
      text-align: center;
    }
    .brandWordmark{
      font-family: "Bangers", system-ui, sans-serif;
      letter-spacing: 1px;
      font-size: 44px;
      line-height: 1;
      margin: 0;
    }

    /* Card */
    .card{
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    /* Make "Choose a Tool" match the old "Chasing Majors" style in your screenshot */
    .chooseTitle{
      margin:0 0 14px 0;
      font-weight: 900;
      font-size: 22px;
      color: var(--text);
    }

    .btn{
      width:100%;
      text-align:left;
      padding:16px;
      margin-top:12px;
      border-radius:16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: var(--text);
      cursor:pointer;
      box-shadow: var(--shadow);
    }
    .btn h3{
      margin:0 0 6px 0;
      font-size:18px;
      font-weight:900;
    }
    .btn p{
      margin:0;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
      line-height:1.35;
    }

    /* ---------- BOTTOM NAV (preloaded on Home too) ---------- */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      z-index: 50;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.30)), var(--bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
    }
    .navRow{
      display:flex;
      gap:10px;
      max-width: 720px;
      margin: 0 auto;
    }
    .navBtn{
      flex:1;
      border:1px solid var(--border);
        background: rgba(255,255,255,.02);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 900;
      cursor:pointer;
    }
    .navBtn.active{
      outline: 2px solid rgba(245,197,66,.25);
      border-color: rgba(245,197,66,.35);
    }
  </style>
</head>

<body>
  <!-- Legacy-style loading overlay (first thing user sees) -->
  <div class="overlay" id="overlay">
    <div class="splashInner">
      <h1 class="splashTitle">Chasing Majors</h1>
      <div class="splashSub">Loading…</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="stack">
      <!-- Branding moved to top like PRV -->
      <div class="topBrand">
        <h1 class="brandWordmark">Chasing Majors</h1>
      </div>

      <!-- Container sits immediately below brand -->
      <div class="card">
        <div class="chooseTitle">Choose a Tool</div>

        <button class="btn" onclick="location.href='/checklists/'">
          <h3>Checklist Vault</h3>
          <p>Search a set or player. Browse Base, Inserts, Autos, Relics, Variations.</p>
        </button>

        <button class="btn" onclick="location.href='/vault/'">
          <h3>Print Run Vault</h3>
          <p>Calculated production estimates. Print run data, not guesses.</p>
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom footer/nav preloaded on Home -->
  <nav class="bottomNav" aria-label="Primary">
    <div class="navRow">
      <button class="navBtn active" type="button" onclick="location.href='/'">Home</button>
      <button class="navBtn" type="button" onclick="location.href='/checklists/'">Checklist Vault</button>
      <button class="navBtn" type="button" onclick="location.href='/vault/'">Print Run Vault</button>
    </div>
  </nav>

  <script>
    // Show splash immediately, hide once page is ready (keeps "app" feel)
    window.addEventListener("load", () => {
      const overlay = document.getElementById("overlay");
      // short minimum display so it feels intentional, not a flash
      setTimeout(() => overlay.classList.add("hidden"), 350);
      // remove from layout after fade
      setTimeout(() => overlay.remove(), 900);
    });
  </script>
</body>
</html>
