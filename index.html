<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>Chasing Majors App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    :root{
      --navH: 62px;
      --contentMax: 900px;

      /* DARK (PRV) */
      --bg:#0b0b0b;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.78);

      --cardBg:rgba(255,255,255,0.08);
      --cardBorder:rgba(255,255,255,0.12);

      --btnPrimaryBg:#ffffff;
      --btnPrimaryText:#000000;

      --navBg:#0b0b0b;
      --navBorder:rgba(255,255,255,0.12);

      --navBtnBg:rgba(255,255,255,0.12);
      --navBtnIcon:#ffffff;
    }

    body.light{
      /* LIGHT (PRV) */
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:rgba(0,0,0,0.70);

      --cardBg:rgba(0,0,0,0.05);
      --cardBorder:rgba(0,0,0,0.10);

      --btnPrimaryBg:#111111;
      --btnPrimaryText:#ffffff;

      --navBg:#ffffff;
      --navBorder:rgba(0,0,0,0.10);

      --navBtnBg:rgba(0,0,0,0.08);
      --navBtnIcon:#0b0b0b;
    }

    html, body { height:100%; }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      transition: background 160ms ease, color 160ms ease;
    }

    /* PRV content wrapper */
    .content{
      padding: 16px 16px calc(var(--navH) + 24px);
      max-width: var(--contentMax);
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* PRV header */
    .headerRow{
      position: relative;
      max-width: var(--contentMax);
      margin: 6px auto 12px;
      text-align: center;
    }
    .appTitle{
      font-family: "Bangers", cursive;
      font-size: 34px;
      letter-spacing: 1px;
      line-height: 1;
      margin: 0;
    }
    .appTitle .big{ font-size: 42px; }

    /* PRV card */
    .card{
      background: var(--cardBg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 16px;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .heroText{
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    /* PRV bottom nav shell (3 buttons) */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      height: var(--navH);
      background: var(--navBg);
      border-top: 1px solid var(--navBorder);
      z-index: 9999;
      display:flex;
      justify-content:center;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .bottomNavInner{
      width:100%;
      max-width: var(--contentMax);
      padding: 10px 16px max(10px, env(safe-area-inset-bottom));
      box-sizing:border-box;
    }
    .navRow{
      display:flex;
      gap:10px;
    }
    .navBtn{
      flex:1;
      height: 42px;
      border:0;
      border-radius: 14px;
      background: var(--navBtnBg);
      color: var(--navBtnIcon);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      transition: background 160ms ease, color 160ms ease;
    }
    .navBtn.active{
      outline: 2px solid rgba(255,255,255,0.18);
    }

    /* SPLASH OVERLAY (same as PRV) */
    .overlay{
      position: fixed;
      inset: 0;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      z-index: 10000;
      transition: opacity 260ms ease, background 160ms ease, color 160ms ease;
    }
    .overlay.hide{
      opacity: 0;
      pointer-events: none;
    }
    .splashInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-align:center;
      width: min(520px, 92vw);
      padding: 34px 18px 18px;
      box-sizing: border-box;
      animation: splashIn 420ms ease forwards;
    }
    @keyframes splashIn{
      from{ opacity: 0; transform: translateY(14px); }
      to{ opacity: 1; transform: translateY(0); }
    }
    .splashTitle{
      font-family: "Bangers", cursive;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing: 1px;
      margin: 0;
    }
    .splashSub{
      opacity: .75;
      font-size: 14px;
      margin-top: -8px;
    }
    .spinner{
      width:44px;
      height:44px;
      border-radius:50%;
      border:4px solid var(--cardBorder);
      border-top-color: var(--text);
      animation: spin 1s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

   /* Homepage tool buttons (old-button vibe) */
.toolBtns{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:12px;
  align-items:center;   
}

.toolBtn{
  display:block;
  text-decoration:none;
  color: var(--text);

  padding:16px 18px;
  border-radius:16px;

  background: var(--navBtnBg);
  border: 1px solid var(--cardBorder);
  box-shadow: 0 10px 28px rgba(0,0,0,0.28);

  width: min(620px, 100%); 
  transition: transform 120ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
}

.toolBtn:hover{
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.22);
  box-shadow: 0 14px 34px rgba(0,0,0,0.34);
}

/* ✅ you use body.light, not html[data-theme="light"] */
body.light .toolBtn:hover{
  border-color: rgba(0,0,0,0.18);
}

.toolBtn:active{
  transform: translateY(0px) scale(0.99);
}

.toolBtnTop{
  font-weight:900;
  font-size:18px;
  letter-spacing:0.2px;
}

.toolBtnSub{
  margin-top:6px;
  font-size:13px;
  line-height:1.35;
  color: var(--muted);
}

/* Mobile spacing */
@media (max-width: 560px){
  .toolBtn{
    padding:15px 16px;
    border-radius:16px;
    width: 100% -28px;
    margin: 0 auto;
  }
  .toolBtnTop{ font-size:17px; }
}

  </style>
</head>

<body>
  <!-- Splash -->
  <div class="overlay" id="overlay">
    <div class="splashInner">
      <h1 class="splashTitle">Chasing Majors</h1>
      <div class="splashSub">Loading…</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div class="content">
    <div class="headerRow">
      <h1 class="appTitle"><span class="big">C</span>hasing <span class="big">M</span>ajors</h1>
    </div>

    <div class="card">
      <div class="heroText">Choose a tool</div>

      <div class="toolBtns">
  <a class="toolBtn" href="/checklists/">
    <div class="toolBtnTop">Checklist Vault</div>
    <div class="toolBtnSub">Search a set or player. Browse Base, Inserts, Autos, Relics, Variations.</div>
  </a>

  <a class="toolBtn" href="/vault/">
    <div class="toolBtnTop">Print Run Vault</div>
    <div class="toolBtnSub">Calculated production estimates. Print run data, not guesses.</div>
  </a>

  <a class="toolBtn" href="/release-schedule/">
    <div class="toolBtnTop">Release Schedule</div>
    <div class="toolBtnSub">What’s dropping next. Filters by sport, date, and brand.</div>
  </a>
</div>
    </div>
  </div>

  <div class="bottomNav" aria-label="Primary">
    <div class="bottomNavInner">
      <div class="navRow">
        <button class="navBtn active" type="button" onclick="location.href='/'">Home</button>
        <button class="navBtn" type="button" onclick="location.href='/checklists/'">Checklist Vault</button>
        <button class="navBtn" type="button" onclick="location.href='/vault/'">Print Run Vault</button>
      </div>
    </div>
  </div>

  <script>
    // PRV-style splash hide
    window.addEventListener("load", () => {
      const el = document.getElementById("overlay");
      setTimeout(() => {
        el.classList.add("hide");
        setTimeout(() => { el.style.display = "none"; }, 320);
      }, 500);
    });
  </script>
</body>
</html>
