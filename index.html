<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>Chasing Majors App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <style>
    :root{
      --navH: 62px;
      --contentMax: 900px;

      /* DARK (PRV) */
      --bg:#0b0b0b;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.78);

      --cardBg:rgba(255,255,255,0.08);
      --cardBorder:rgba(255,255,255,0.12);

      --btnPrimaryBg:#ffffff;
      --btnPrimaryText:#000000;

      --navBg:#0b0b0b;
      --navBorder:rgba(255,255,255,0.12);

      --navBtnBg:rgba(255,255,255,0.12);
      --navBtnIcon:#ffffff;
    }

    body.light{
      /* LIGHT (PRV) */
      --bg:#ffffff;
      --text:#0b0b0b;
      --muted:rgba(0,0,0,0.70);

      --cardBg:rgba(0,0,0,0.05);
      --cardBorder:rgba(0,0,0,0.10);

      --btnPrimaryBg:#111111;
      --btnPrimaryText:#ffffff;

      --navBg:#ffffff;
      --navBorder:rgba(0,0,0,0.10);

      --navBtnBg:rgba(0,0,0,0.08);
      --navBtnIcon:#0b0b0b;
    }

    html, body { height:100%; }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      transition: background 160ms ease, color 160ms ease;
    }

    /* PRV content wrapper */
    .content{
      padding: 16px 16px calc(var(--navH) + 24px);
      max-width: var(--contentMax);
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* PRV header */
    .headerRow{
      position: relative;
      max-width: var(--contentMax);
      margin: 6px auto 12px;
      text-align: center;
    }
    .appTitle{
      font-family: "Bangers", cursive;
      font-size: 34px;
      letter-spacing: 1px;
      line-height: 1;
      margin: 0;
    }
    .appTitle .big{ font-size: 42px; }

    /* PRV card */
    .card{
      background: var(--cardBg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 16px;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .heroText{
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .toolBtn{
      width:100%;
      margin-top:10px;
      padding: 12px;
      border:0;
      border-radius: 12px;
      background: var(--btnPrimaryBg);
      color: var(--btnPrimaryText);
      font-weight:700;
      cursor:pointer;
      transition: background 160ms ease, color 160ms ease;
      text-align:left;
    }
    .toolBtn .t{ font-weight:800; }
    .toolBtn .s{ display:block; margin-top:6px; opacity:.75; font-size:13px; line-height:1.35; }

    /* PRV bottom nav shell (3 buttons) */
    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      height: var(--navH);
      background: var(--navBg);
      border-top: 1px solid var(--navBorder);
      z-index: 9999;
      display:flex;
      justify-content:center;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .bottomNavInner{
      width:100%;
      max-width: var(--contentMax);
      padding: 10px 16px max(10px, env(safe-area-inset-bottom));
      box-sizing:border-box;
    }
    .navRow{
      display:flex;
      gap:10px;
    }
    .navBtn{
      flex:1;
      height: 42px;
      border:0;
      border-radius: 14px;
      background: var(--navBtnBg);
      color: var(--navBtnIcon);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      transition: background 160ms ease, color 160ms ease;
    }
    .navBtn.active{
      outline: 2px solid rgba(255,255,255,0.18);
    }

    /* SPLASH OVERLAY (same as PRV) */
    .overlay{
      position: fixed;
      inset: 0;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      z-index: 10000;
      transition: opacity 260ms ease, background 160ms ease, color 160ms ease;
    }
    .overlay.hide{
      opacity: 0;
      pointer-events: none;
    }
    .splashInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      text-align:center;
      width: min(520px, 92vw);
      padding: 34px 18px 18px;
      box-sizing: border-box;
      animation: splashIn 420ms ease forwards;
    }
    @keyframes splashIn{
      from{ opacity: 0; transform: translateY(14px); }
      to{ opacity: 1; transform: translateY(0); }
    }
    .splashTitle{
      font-family: "Bangers", cursive;
      font-size: 44px;
      line-height: 1.05;
      letter-spacing: 1px;
      margin: 0;
    }
    .splashSub{
      opacity: .75;
      font-size: 14px;
      margin-top: -8px;
    }
    .spinner{
      width:44px;
      height:44px;
      border-radius:50%;
      border:4px solid var(--cardBorder);
      border-top-color: var(--text);
      animation: spin 1s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }
  </style>
</head>

<body>
  <!-- Splash -->
  <div class="overlay" id="overlay">
    <div class="splashInner">
      <h1 class="splashTitle">Chasing Majors</h1>
      <div class="splashSub">Loading…</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div class="content">
    <div class="headerRow">
      <h1 class="appTitle"><span class="big">C</span>hasing <span class="big">M</span>ajors</h1>
    </div>

    <div class="card">
      <div class="heroText">Choose a tool</div>

      <button class="toolBtn" onclick="location.href='/checklists/'">
        <span class="t">Checklist Vault</span>
        <span class="s">Search a set or player. Browse Base, Inserts, Autos, Relics, Variations.</span>
      </button>

      <button class="toolBtn" onclick="location.href='/vault/'">
        <span class="t">Print Run Vault</span>
        <span class="s">Production estimates and print run data.</span>
      </button>
    </div>
  </div>

  <div class="bottomNav" aria-label="Primary">
    <div class="bottomNavInner">
      <div class="navRow">
        <button class="navBtn active" type="button" onclick="location.href='/'">Home</button>
        <button class="navBtn" type="button" onclick="location.href='/checklists/'">Checklist Vault</button>
        <button class="navBtn" type="button" onclick="location.href='/vault/'">Print Run Vault</button>
      </div>
    </div>
  </div>

  <script>
    // PRV-style splash hide
    window.addEventListener("load", () => {
      const el = document.getElementById("overlay");
      setTimeout(() => {
        el.classList.add("hide");
        setTimeout(() => { el.style.display = "none"; }, 320);
      }, 500);
    });
  </script>
</body>
</html>
